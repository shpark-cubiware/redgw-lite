# RedGW Prometheus Configuration
# ─────────────────────────────────────────────────────────────
# Prometheus scrapes RedGW metrics via Nginx internal proxy.
# Nginx injects the admin API key header automatically.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # RedGW 애플리케이션 메트릭
  # Nginx가 /prometheus/metrics → /metrics로 프록시하며 X-API-Key 헤더를 자동 주입
  - job_name: 'redgw'
    metrics_path: '/prometheus/metrics'
    scheme: http
    static_configs:
      - targets: ['nginx:8080']
        labels:
          service: 'redgw'
          environment: 'production'
